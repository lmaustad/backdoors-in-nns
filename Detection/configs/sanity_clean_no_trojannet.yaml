detectors:
  - name: "weight_forensics"
    config:
      artifact_root_dir: "./Detection/results_sanity_clean"
      force_clean_label: true
      deadzone_eps: 1.0e-4
      plot_title_fontsize: 24
      plot_label_fontsize: 26
      plot_tick_fontsize: 18
      plot_cbar_fontsize: 18
      plot_width: 9.0
      plot_height: 6.5
      save_heatmaps: true
      max_heatmap_layers: 10
      max_heatmap_elements: 200000
      large_weight_threshold: 0.0
      large_weight_percentile: 99.5
      save_histograms: true
      max_histogram_layers: 5
      histogram_bins: 80
      save_report: true

  - name: "neural_cleanse"
    config:
      artifact_root_dir: "./Detection/results_sanity_clean"
      steps: 1000
      mini_batch: 16
      batch_size: 32
      lr: 0.1
      init_cost: 1.0e-3
      cost_multiplier: 1.5
      patience: 10
      reset_cost_to_zero: true
      attack_succ_threshold: 0.99
      early_stop: true
      early_stop_threshold: 0.99
      early_stop_patience: 20
      mad_threshold: 2.0
      save_trigger_images: true
      clip_min: null
      clip_max: null

  - name: "model_summary"
    config:
      artifact_root_dir: "./Detection/results_sanity_clean"
      force_clean_label: true
      save_report: true
      summary_depth: 10
      save_graph: true
      graph_format: "pdf"

  - name: "shap_explainer"
    config:
      artifact_root_dir: "./Detection/results_sanity_clean"
      bg_size: 64 # number of background samples for GradientExplainer baseline
      background_seed: 0
      background_uniform: true
      grayscale_before_overlay: true # if true, grayscale the attribution base image before heatmap overlay
      plot_title_fontsize: 20
      use_triggered_samples: true # if true, also run SHAP on adapter-triggered samples
      trigger_kwargs: {} # extra kwargs passed to adapter.get_triggered_sample()

  - name: "gradcam_pp"
    config:
      artifact_root_dir: "./Detection/results_sanity_clean"
      target_layer_name: null # global fallback (null = auto-detect last Conv2d)
      alpha: 0.5 # heatmap transparency on the overlay panel (0 = invisible, 1 = opaque)
      use_triggered_samples: true # if true, also run Grad-CAM++ on adapter-triggered samples
      trigger_kwargs: {} # extra kwargs passed to adapter.get_triggered_sample()
      sample_occurrence: 1 # 1=first sample per class, 2=skip first/use second, etc.
      # Per-attack reflect-padding overrides (same key format as target_layers).
      # true = switch all Conv2d zero-padding to reflect-padding during CAM
      # computation to suppress border-gradient artifacts in deep models.
      reflect_padding:
        baseline_inception_v3_imagenet_clean: true
      target_layers:
        # Arch backdoors AlexNet CIFAR-10 — conv2 (7x7) over conv5 (3x3)
        ARCHITECTURAL-BACKDOORS_AlexNet_cifar10: "features.3"
        # BadNets MNIST — conv1 (24x24) over conv2 (8x8) for better spatial detail
        badnets-pytorch_BADNET_mnist: "conv1.0"
        # BadNets ResNet18 CIFAR-10 — prefer layer2 for higher-resolution CAMs
        #badnets-pytorch_RESNET18_cifar10: "layer3.1.conv2"
        badnets-pytorch_RESNET18_cifar10: "layer3"
        # DFBA CNN MNIST — first conv (24x24) for spatial detail
        DataFree_Backdoor_Attacks_CNN_mnist: "cnn.0"
        DataFree_Backdoor_Attacks_CNN_fmnist: "cnn.0"
        # DFBA ResNet CIFAR-10 — maxpool kept so layer4=2x2; target layer2 (8x8)
        #DataFree_Backdoor_Attacks_RESNET_cifar10: "layer2.1.conv2"
        DataFree_Backdoor_Attacks_RESNET_cifar10: "layer2"
        # Handcrafted CNN MNIST — conv1 (14x14) over conv2 (7x7)
        #Handcrafted_Backdoors_CNN_mnist: "conv1"
        # Clean Inception V3 baseline — use Mixed_6e (17×17) to match
        # TrojanNet target layer for fair side-by-side comparison.
        TrojanNet_TrojanNet+inception_v3_imagenet: "Mixed_6e"

visualization:
  save_plots: false
